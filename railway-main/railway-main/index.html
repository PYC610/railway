<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- ⭐ APP 風格優化 viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e272e">
    <meta name="mobile-web-app-capable" content="yes">
    <title>台北車站無障礙導航 - finalfriday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="controls">
            <h2 class="sys-title">台北車站無障礙導航 (<span id="current-floor-display">B1 樓層</span>)</h2>
            
            <div class="control-group" style="margin-bottom: 20px;">
                <button class="btn" style="width: 100%; border-color: #4bcffa; color: #4bcffa;" onclick="openMapModal()">
                    🗺️ 查看台北捷運路網圖
                </button>
            </div>

            <div class="control-group">
                <label for="station-input">1. 請輸入或選擇目的地車站：</label>
                <div class="search-wrapper">
                    <input 
                        id="station-input" 
                        class="btn station-input" 
                        type="text" 
                        placeholder="🔍 輸入站名，例：西門" 
                        autocomplete="off"
                        oninput="filterStations(this.value)"
                        onfocus="showDropdown()"
                    />
                    <div id="station-dropdown" class="station-dropdown"></div>
                </div>
                <!-- 自動判斷方向顯示 -->
                <div id="direction-badge" class="direction-badge" style="display:none;"></div>
            </div>

            <div class="control-group">
                <label for="route-type">2. 請選擇導航模式：</label>
                <div class="btn-group">
                <button id="btn-accessible" class="btn mode-btn" onclick="setMode('accessible')">♿ 無障礙路線</button>
                <button id="btn-general" class="btn mode-btn" onclick="setMode('general')">🚶 一般路線</button>
                </div>
            </div>  

            <button id="main-nav-btn" class="btn nav-btn" onclick="startNav()">開始無障礙導航 (高鐵閘門 → B1 電梯)</button>

            <div id="next-floor-container" style="display: none; margin-top: 15px;"></div>
        </div>

        <div id="viewport">
            <div id="map-wrapper">
                <img id="map-img" src="taipei_b1.png" alt="台北車站地圖">
                <svg id="svg-layer">
                    <!-- ⭐ 新增：箭頭標記定義 -->
                    <defs>
                        <marker id="arrowhead-green" markerWidth="30" markerHeight="30" refX="25" refY="15" orient="auto">
                            <polygon points="0,0 30,15 0,30" fill="#2ecc71" opacity="0.9"/>
                        </marker>
                        <marker id="arrowhead-blue" markerWidth="30" markerHeight="30" refX="25" refY="15" orient="auto">
                            <polygon points="0,0 30,15 0,30" fill="#4bcffa" opacity="0.9"/>
                        </marker>
                    </defs>
                    <path id="route-path" d="" fill="none" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="mapModal" class="modal" onclick="closeMapModal()">
        <span class="modal-close">&times;</span>
        <img src="https://web.metro.taipei/pages/assets/images/routemap2023n.png" alt="捷運圖放大">
    </div>

    <script src="script.js"></script>
</body>
</html>
